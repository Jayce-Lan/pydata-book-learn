[loggers]
keys=root

[handlers]
keys=consoleHandler,infoHandler,errorHandler,debugHandler

[formatters]
keys=simpleFormatter

[logger_root]
level=DEBUG
handlers=consoleHandler,infoHandler,errorHandler,debugHandler
propagate=0

# ===================== 控制台输出 =====================
[handler_consoleHandler]
class=StreamHandler
level=INFO
formatter=simpleFormatter
args=(sys.stdout,)

# ===================== INFO 日志：按天切割 =====================
[handler_infoHandler]
class=handlers.TimedRotatingFileHandler
level=INFO
formatter=simpleFormatter
args=('logs/info/info.log', 'midnight', 1, 7, 'utf-8')
kwargs={'delay':True}

# ===================== ERROR 日志：按天切割 =====================
[handler_errorHandler]
class=handlers.TimedRotatingFileHandler
level=ERROR
formatter=simpleFormatter
args=('logs/error/error.log', 'midnight', 1, 7, 'utf-8')
kwargs={'delay':True}

# ===================== DEBUG 日志：按天切割 =====================
[handler_debugHandler]
class=handlers.TimedRotatingFileHandler
level=DEBUG
formatter=simpleFormatter
args=('logs/debug/debug.log', 'midnight', 1, 7, 'utf-8')
kwargs={'delay':True}

# ===================== 日志格式（文件名+行号） =====================
# %(filename)s：文件名
# %(lineno)d：行号
[formatter_simpleFormatter]
format=%(asctime)s - %(filename)s(%(lineno)d) - %(levelname)s: %(message)s
datefmt=%Y-%m-%d %H:%M:%S